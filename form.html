<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuovo Libro</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <!-- NAVBAR IDENTICA -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="#">
          <img src="./img/duck.png" alt="Logo" height="36" />
          <span class="text-white fw-semibold d-none d-lg-inline"
            >Catalogo Libri</span
          >
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link text-white-50" href="#">Anagrafica Utenti</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white-50" href="#">Storico Prestiti</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white-50" href="#">Help</a>
            </li>
          </ul>
          <div class="d-flex gap-2 my-2 my-lg-0">
            <input
              class="form-control form-control-sm"
              type="text"
              placeholder="Cerca..."
            />
            <button class="btn btn-dark border btn-sm">Cerca</button>
          </div>
        </div>
      </div>
    </nav>

    <!-- CONTENUTO PRINCIPALE -->
    <div class="container-fluid" p-4>
      <h4 class="mb-4">Nuovo Libro</h4>
      <form action="">
        <div class="row mb-3">
          <div class="col-12 col-md-6">
            <div class="mb-3 mb-md-0">
              <label for="nomeAutore" class="form-label">Nome Autore</label>
              <input
                type="text"
                class="form-control"
                id="nomeAutore"
                placeholder="Inserisci il nome dell'autore"
              />
            </div>
            <!-- /mb-3 mb-md-0 -->
          </div>
          <!-- /col-12 col-md-6 -->

          <div class="col-12 col-md-6">
            <div>
              <label for="cognomeAutore" class="form-label"
                >Cognome Autore</label
              >
              <input
                type="text"
                class="form-control"
                id="cognomeAutore"
                placeholder="Inserisci il cognome dell'autore"
              />
            </div>
          </div>
        </div>
        <!-- /row mb-3 -->

        <!-- RIGA 2: TITOLO -->
        <div class="row mb-3">
          <div class="col-12">
            <label for="titolo" class="form-label">Titolo</label>
            <input
              type="text"
              class="form-control"
              id="titolo"
              placeholder="Inserisci il titolo del libro"
            />
            <div class="form-text">Titolo versione italiana o originale</div>
          </div>
        </div>
        <!-- /row mb-3 -->


        <!-- RIGA 3 -->
        <div class="row mb-3">

          <div class="col-12 col-md-4">
            <div class="mb-3 mb-md-0">
              <label for="genere" class="form-label">Genere</label>
              <select class="form-select" id="genere">
                <option selected>Scegli il genere</option>
                <option value="narrativa">Narrativa</option>
                <option value="saggistica">Saggistica</option>
                <option value="fantascienza">Fantascienza</option>
                <option value="fantasy">Fantasy</option>
                <option value="thriller">Thriller</option>
                <option value="romanzoStorico">Romanzo Storico</option>
                <option value="poesia">Poesia</option>
              </select>
            </div>
          </div>

          <div class="col-12 col-md-4">
            <div class="mb-3 mb-md-0">
              <label for="annoPubblicazione" class="form-label"
                >Anno Pubblicazione</label
              >
              <input
                type="number"
                class="form-control"
                id="annoPubblicazione"
                placeholder="Inserisci l'anno di pubblicazione"
              />
            </div>
          </div>

          <div class="col-12 col-md-4">
            <div class="mb-3 mb-md-0">
              <label for="anno" class="form-label">Anno di Pubblicazione</label>
              <input
                type="number"
                class="form-control"
                id="anno"
                placeholder="Inserisci l'anno"
              />
            </div>
          </div>

          <div class="col-12 col-md-4">
            <div>
              <label for="isbn" class="form-label">ISBN#</label>
              <input
                type="text"
                class="form-control"
                id="isbn"
                placeholder="Inserisci il codice ISBN#"
              />
            </div>
          </div>
        </div>
      </form>
    </div>
    <!-- /container-fluid p-4 -->
  </body>
</html>
